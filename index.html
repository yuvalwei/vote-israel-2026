function BlocPieChart({ poll }) {
  const data = BLOCS.map((b) => ({
    name: b.label,
    value: b.parties.reduce((sum, pid) => sum + (poll.seats[pid] || 0), 0),
    color: b.color,
  })).filter((d) => d.value > 0);
  const coalitionSeats = BLOCS[0].parties.reduce((sum, pid) => sum + (poll.seats[pid] || 0), 0);

  const size = 210;
  const strokeWidth = 32;
  const radius = (size - strokeWidth) / 2;
  const circumference = 2 * Math.PI * radius;
  const total = data.reduce((s, d) => s + d.value, 0);
  const gapPx = total ? 4 : 0;
  let cumulative = 0;

  return (
    <div style={{ marginBottom: "20px" }}>
      <div style={{ fontSize: "12px", fontWeight: 700, letterSpacing: "0.05em", color: "#6B7280", marginBottom: "8px" }}>מפת גושים</div>
      <div style={{ position: "relative", height: `${size}px`, display: "flex", justifyContent: "center" }}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <g transform={`rotate(-90 ${size / 2} ${size / 2})`}>
            {data.map((d, i) => {
              const frac = total ? d.value / total : 0;
              const len = Math.max(circumference * frac - gapPx, 0);
              const dashoffset = -cumulative;
              cumulative += circumference * frac;
              return (
                <circle key={i} cx={size / 2} cy={size / 2} r={radius} fill="none" stroke={d.color}
                  strokeWidth={strokeWidth} strokeDasharray={`${len} ${circumference - len}`}
                  strokeDashoffset={dashoffset} strokeLinecap="round" />
              );
            })}
          </g>
        </svg>
        <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)", textAlign: "center", pointerEvents: "none" }}>
          <div style={{ fontSize: "24px", fontWeight: 900, fontFamily: "'Rubik', sans-serif", color: "#181433" }}>{coalitionSeats}</div>
          <div style={{ fontSize: "10.5px", color: "#9CA3C4" }}>קואליציה מתוך 61</div>
        </div>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: "14px", marginTop: "10px" }}>
        {data.map((d, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: "5px", fontSize: "12px", color: "#3C3860" }}>
            <span style={{ width: "10px", height: "10px", borderRadius: "50%", background: d.color, display: "inline-block" }} />
            {d.name} ({d.value})
          </div>
        ))}
      </div>
      <p style={{ fontSize: "11px", color: "#9CA3C4", marginTop: "6px", lineHeight: 1.6, textAlign: "center" }}>"אופוזיציה" כולל גם את ישר וישראל ביתנו — שטרם הכריעו סופית לאיזה צד הן נוטות (פירוט בטאב "עמדות").</p>
    </div>
  );
}

function PersonalCompareTab() {
  const [pair, setPair] = useState([]);
  const [topicIndex, setTopicIndex] = useState(0);
  const [dragX, setDragX] = useState(0);
  const draggingRef = useRef(false);
  const startXRef = useRef(0);

  const togglePair = (id) => setPair((prev) => {
    if (prev.includes(id)) return prev.filter((x) => x !== id);
    if (prev.length >= 2) return [prev[1], id];
    return [...prev, id];
  });

  const partyA = PARTIES.find((p) => p.id === pair[0]);
  const partyB = PARTIES.find((p) => p.id === pair[1]);
  const ready = partyA && partyB;

  const goNext = () => setTopicIndex((i) => Math.min(TOPICS.length - 1, i + 1));
  const goPrev = () => setTopicIndex((i) => Math.max(0, i - 1));

  const onDragStart = (clientX) => { draggingRef.current = true; startXRef.current = clientX; };
  const onDragMove = (clientX) => { if (draggingRef.current) setDragX(clientX - startXRef.current); };
  const onDragEnd = () => {
    if (!draggingRef.current) return;
    draggingRef.current = false;
    if (dragX < -70) goNext();
    else if (dragX > 70) goPrev();
    setDragX(0);
  };

  if (!ready) {
    return (
      <div>
        <p style={{ fontSize: "13.5px", color: "#3C3860", lineHeight: 1.7, marginBottom: "6px" }}>ראש בראש: בחרו בדיוק שתי מפלגות להשוואה.</p>
        <p style={{ fontSize: "12.5px", color: "#9CA3C4", lineHeight: 1.6, marginBottom: "16px" }}>{pair.length === 0 ? "עוד לא נבחרה אף מפלגה." : `נבחרה מפלגה אחת (${PARTIES.find(p => p.id === pair[0])?.name}) — בחרו עוד אחת.`}</p>
        <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
          {PARTIES.map((p) => {
            const on = pair.includes(p.id);
            return (
              <button key={p.id} onClick={() => togglePair(p.id)} style={{ display: "flex", alignItems: "center", gap: "6px", border: `1.5px solid ${on ? p.color : "#E3E4F5"}`, background: on ? `${p.color}14` : "#FFFFFF", borderRadius: "8px", padding: "8px 12px", fontSize: "13.5px", color: "#181433", fontFamily: "'Heebo', sans-serif", cursor: "pointer" }}>
                <span style={{ width: "9px", height: "9px", borderRadius: "50%", background: p.color, display: "inline-block", flexShrink: 0 }} />{p.name}
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  const topic = TOPICS[topicIndex];
  const rotate = dragX / 18;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "14px" }}>
        <button onClick={() => { setPair([]); setTopicIndex(0); }} style={{ background: "none", border: "none", color: "#1857C4", fontSize: "12.5px", cursor: "pointer", padding: 0 }}>↺ בחרו זוג אחר</button>
        <span style={{ fontSize: "12.5px", color: "#6B7280", fontWeight: 700 }}>{topicIndex + 1} / {TOPICS.length}</span>
      </div>

      <div
        style={{ position: "relative", height: "320px", touchAction: "pan-y", userSelect: "none" }}
        onTouchStart={(e) => onDragStart(e.touches[0].clientX)}
        onTouchMove={(e) => onDragMove(e.touches[0].clientX)}
        onTouchEnd={onDragEnd}
        onMouseDown={(e) => onDragStart(e.clientX)}
        onMouseMove={(e) => onDragMove(e.clientX)}
        onMouseUp={onDragEnd}
        onMouseLeave={onDragEnd}
      >
        <div style={{ position: "absolute", inset: 0, transform: `translateX(${dragX}px) rotate(${rotate}deg)`, transition: draggingRef.current ? "none" : "transform .25s ease", cursor: "grab" }}>
          <HeadToHeadCard topic={topic} partyA={partyA} partyB={partyB} />
        </div>
        {dragX < -30 && <div style={{ position: "absolute", left: "12px", top: "12px", background: "#1857C4", color: "#fff", fontSize: "11px", fontWeight: 700, borderRadius: "999px", padding: "4px 10px" }}>הבא ←</div>}
        {dragX > 30 && <div style={{ position: "absolute", right: "12px", top: "12px", background: "#1857C4", color: "#fff", fontSize: "11px", fontWeight: 700, borderRadius: "999px", padding: "4px 10px" }}>→ הקודם</div>}
      </div>

      <div style={{ display: "flex", justifyContent: "center", gap: "6px", margin: "14px 0" }}>
        {TOPICS.map((t, i) => <span key={t.id} style={{ width: i === topicIndex ? "16px" : "6px", height: "6px", borderRadius: "999px", background: i === topicIndex ? "#1857C4" : "#E3E4F5", transition: "all .2s ease" }} />)}
      </div>

      <div style={{ display: "flex", gap: "10px" }}>
        <button onClick={goPrev} disabled={topicIndex === 0} style={{ flex: 1, padding: "12px", background: "#FFFFFF", border: "1.5px solid #ECEAFB", color: topicIndex === 0 ? "#C7CADB" : "#181433", borderRadius: "8px", fontSize: "14px", fontFamily: "'Heebo', sans-serif", cursor: topicIndex === 0 ? "not-allowed" : "pointer" }}>→ הקודם</button>
        <button onClick={goNext} disabled={topicIndex === TOPICS.length - 1} style={{ flex: 1, padding: "12px", background: "#181433", border: "none", color: topicIndex === TOPICS.length - 1 ? "#8A8FB8" : "#FAFAFF", borderRadius: "8px", fontSize: "14px", fontFamily: "'Heebo', sans-serif", cursor: topicIndex === TOPICS.length - 1 ? "not-allowed" : "pointer" }}>הבא ←</button>
      </div>
      <p style={{ fontSize: "11.5px", color: "#9CA3C4", marginTop: "10px", textAlign: "center" }}>גררו את הכרטיס ימינה או שמאלה, או השתמשו בכפתורים.</p>
    </div>
  );
}

function QuizTab({ onViewTopMatches }) {
  const [answers, setAnswers] = useState({});
  const [showResults, setShowResults] = useState(false);
  const answeredCount = Object.keys(answers).length;
  const setAnswer = (qid, v) => setAnswers((prev) => ({ ...prev, [qid]: v }));
  const results = useMemo(() => {
    const scores = {};
    PARTIES.forEach((p) => (scores[p.id] = 0));
    let maxPossible = 0;
    QUESTIONS.forEach((q) => {
      const a = answers[q.id];
      if (a === undefined) return;
      maxPossible += 4;
      PARTIES.forEach((p) => { scores[p.id] += a * (q.stance[p.id] || 0); });
    });
    return PARTIES.map((p) => ({ ...p, score: scores[p.id], pct: maxPossible ? Math.round(((scores[p.id] + maxPossible) / (2 * maxPossible)) * 100) : 0 })).sort((a, b) => b.score - a.score);
  }, [answers]);
  const reset = () => { setAnswers({}); setShowResults(false); };

  if (showResults) {
    const top = results.slice(0, 5);
    return (
      <div>
        <h3 style={{ fontFamily: "'Rubik', sans-serif", fontSize: "20px", margin: "0 0 6px" }}>ההתאמות שלך</h3>
        <p style={{ fontSize: "13px", color: "#6B7280", marginBottom: "16px", lineHeight: 1.6 }}>מבוסס על {answeredCount} תשובות מתוך {QUESTIONS.length}.</p>
        <div style={{ display: "flex", flexDirection: "column", gap: "10px", marginBottom: "20px" }}>
          {top.map((p, i) => (
            <div key={p.id} style={{ background: "#FFFFFF", border: "1px solid #ECEAFB", borderRight: `5px solid ${p.color}`, borderRadius: "6px", padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                  <span style={{ fontFamily: "'Rubik', sans-serif", fontWeight: 900, fontSize: "15px", color: "#9CA3C4" }}>{i + 1}</span>
                  <span style={{ fontFamily: "'Rubik', sans-serif", fontWeight: 700, fontSize: "16.5px" }}>{p.name}</span>
                </div>
                <span style={{ fontSize: "14px", fontWeight: 700, color: p.color }}>{p.pct}%</span>
              </div>
              <div style={{ background: "#EEEDFA", borderRadius: "4px", height: "8px", marginTop: "8px", overflow: "hidden" }}><div style={{ width: `${p.pct}%`, background: p.color, height: "100%" }} /></div>
            </div>
          ))}
        </div>
        <button onClick={() => onViewTopMatches(top.slice(0, 3).map((p) => p.id))} style={{ width: "100%", padding: "13px", background: "#1857C4", color: "#fff", border: "none", borderRadius: "6px", fontSize: "14.5px", fontWeight: 700, fontFamily: "'Heebo', sans-serif", cursor: "pointer", marginBottom: "10px" }}>
          ראו את העמדות המלאות של 3 ההתאמות הכי גבוהות שלכם ←
        </button>
        <button onClick={reset} style={{ width: "100%", padding: "12px", background: "#FFFFFF", color: "#181433", border: "1.5px solid #ECEAFB", borderRadius: "6px", fontSize: "14px", fontFamily: "'Heebo', sans-serif", cursor: "pointer" }}>למלא שוב מההתחלה</button>
        <p style={{ fontSize: "12px", color: "#9CA3C4", marginTop: "14px", lineHeight: 1.7 }}><strong>הבהרה חשובה:</strong> בשונה מטאב "עמדות", השאלון הזה מבוסס על הערכה מפושטת של Claude למיצוב אידיאולוגי כללי — לא על ציטוטים או מצעים ישירים. כלי אוריינטציה בלבד.</p>
      </div>
    );
  }

  return (
    <div>
      <p style={{ fontSize: "13.5px", color: "#3C3860", lineHeight: 1.7, marginBottom: "18px" }}>20 שאלות, 5 תחומים. אפשר לדלג על שאלה.</p>
      <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
        {QUESTIONS.map((q) => (
          <div key={q.id} style={{ background: "#FFFFFF", border: "1px solid #ECEAFB", borderRadius: "6px", padding: "14px 16px" }}>
            <div style={{ marginBottom: "10px" }}>
              <span style={{ fontSize: "11px", color: "#B8960C", fontWeight: 700, letterSpacing: "0.03em" }}>{q.cat}</span>
              <p style={{ margin: "4px 0 0", fontSize: "14.5px", lineHeight: 1.6 }}>{q.text}</p>
            </div>
            <div style={{ display: "flex", gap: "5px", flexWrap: "wrap" }}>
              {LIKERT.map((opt) => {
                const selected = answers[q.id] === opt.v;
                return <button key={opt.v} onClick={() => setAnswer(q.id, opt.v)} style={{ flex: "1 1 0", minWidth: "58px", padding: "9px 4px", fontSize: "10.5px", lineHeight: 1.3, borderRadius: "8px", border: selected ? "1.5px solid #181433" : "1.5px solid #ECEAFB", background: selected ? "#181433" : "#fff", color: selected ? "#FAFAFF" : "#3C3860", cursor: "pointer", fontFamily: "'Heebo', sans-serif", fontWeight: selected ? 700 : 500 }}>{opt.label}</button>;
              })}
            </div>
          </div>
        ))}
      </div>
      <button onClick={() => setShowResults(true)} disabled={answeredCount === 0} style={{ width: "100%", marginTop: "20px", padding: "14px", background: answeredCount ? "#1857C4" : "#ECEAFB", color: "#fff", border: "none", borderRadius: "6px", fontSize: "15px", fontWeight: 700, fontFamily: "'Heebo', sans-serif", cursor: answeredCount ? "pointer" : "not-allowed" }}>הצג תוצאות ({answeredCount}/{QUESTIONS.length} נענו)</button>
    </div>
  );
}
